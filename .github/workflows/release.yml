name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            suffix: darwin-arm64
            target: ""
          - os: macos-latest
            suffix: darwin-x64
            target: "--target=bun-darwin-x64"
            extra_pkg: "@opentui/core-darwin-x64@0.1.87"
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
            target: ""
          - os: ubuntu-latest
            suffix: linux-x64
            target: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Install cross-platform deps
        if: matrix.extra_pkg
        run: bun add ${{ matrix.extra_pkg }}

      - name: Build native binary
        run: bun build --compile --minify ${{ matrix.target }} src/index.ts --outfile dist/cereus-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: cereus-${{ matrix.suffix }}
          path: dist/cereus-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x artifacts/cereus-*
          gh release create "${{ github.ref_name }}" \
            --title "cereus ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/cereus-*
